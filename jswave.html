<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>WaveScene.cpp.js</title>
    <script>
        var canvas, width, height, ctx, map = [], mp = 16, freespace;
        function onload() {
            freeheight = window.innerHeight - parseInt(document.defaultView.getComputedStyle(document.getElementsByTagName('div')[0]).height)
            canvas = document.getElementsByTagName('canvas')[0];
            canvas.width = window.innerWidth - (window.innerWidth * 0.25);
            canvas.height = freeheight - (freeheight * 0.1);
            width = parseInt(canvas.width / mp);
            height = parseInt(canvas.height / mp);
            ctx = canvas.getContext('2d');

            setup();
            setInterval(tick, 66);
        }

        function xyToIndex(h, x, y) {
            return y * h + x;
        }

        function drawMap(ctx, map) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (y = 0; y < height; y++) {
                for (x = 0; x < width; x++) {
                    const i = xyToIndex(width, x, y);
                    ctx.fillStyle = `rgb(${(map[i] ** (4 + (map[i] * 0.5))) * Math.cos(map[i]) * 255}, ${(map[i] ** (3 + (map[i] * 0.5))) * Math.sin(map[i]) * 255}, ${(map[i] ** (2 + (map[i] * 0.5))) * 255})`;
                    ctx.fillRect(x * mp + (1 - map[i] * 0.95) / 2, y * mp + (1 - map[i] * 0.95) / 2, mp * map[i] * 0.95, mp * map[i] * 0.95);
                }
            }
        }

        function setup() {
            map = new Array(width * height);
            for (y = 0; y < height; y++) {
                for (x = 0; x < width; x++) {
                    const i = xyToIndex(width, x, y);
                    map[i] = Math.random();
                }
            }
        }

        function tick() {
            let lastMap = map;
            map = new Array(width * height);

            for (y = 0; y < height; y++) {
                for (x = 0; x < width; x++) {
                    const i = xyToIndex(width, x, y);
                    const lastValue = lastMap[i];

                    map[i] = lastValue * (0.96 + 0.02 * Math.random());

                    if (lastValue <= (0.18 + 0.04 * Math.random())) {
                        let n = 0;

                        for (u = -1; u <= 1; u++) {
                            for (v = -1; v <= 1; v++) {
                                if (u == 0 && v == 0) {
                                    continue;
                                }

                                let nX = Math.abs((x + u) % width);
                                let nY = Math.abs((y + v) % height);

                                const nI = xyToIndex(width, nX, nY);
                                const nLastValue = lastMap[nI];

                                if (nLastValue >= (0.5 + 0.04 * Math.random())) {
                                    n += 1;
                                    map[i] += nLastValue * (0.8 + 0.4 * Math.random());
                                }
                            }
                        }

                        if (n > 0) {
                            map[i] *= 1 / n;
                        }

                        if (map[i] > 1)
                            map[i] = 1;
                    }
                }
            }
            drawMap(ctx, map);
        }
    </script>
    <style>
        :root {
            --color: black;
            --bgcolor: white;
            --lightcolor: grey;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color: white;
                --bgcolor: #202020;
                --lightcolor: lightgray;
            }
        }

        html {
            display: table;
            margin: auto;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: sans-serif;
            font-size: larger;
            color: var(--lightcolor);
            background-color: var(--bgcolor);
            padding-top: 10px;
            display: table-cell;
            vertical-align: top;
            text-align: center;
        }

        h1 {
            text-align: center;
            color: var(--color);
        }

        a {
            color: coral;
        }

        a:visited {
            color: lightcoral;
        }

        canvas {
            background-color: black;
        }
    </style>
</head>

<body onload="onload()">
    <div id="div">
        <h1>A port of WaveScene.cpp from a Reddit post</h1>
        <p>Original: <a href="https://github.com/Knifa/matryx-gl/blob/master/src/scenes/WaveScene.cpp">Github source code</a>, <a href="https://www.reddit.com/r/raspberry_pi/comments/hxlk9c/been_working_on_this_led_matrix_display_project/">Reddit post</a></p>
    </div>
    <canvas width="64" height="64" id="canvas"></canvas>
</body>

</html>
