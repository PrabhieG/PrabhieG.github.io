<!DOCTYPE html>
<html lang="en">

<head>
    <title>Elapsed Wage Stopwatch</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Elapsed Wage Stopwatch</h1>
    <table>
        <tbody>
            <tr>
                <td class="label">Elapsed earnings:</td>
                <td>$<span id="money"></span><span id="time"></span></td>
            </tr>
            <tr>
                <td class="label">Hourly earnings:</td>
                <td>$<input id="hour" placeholder="0.00"></td>
            </tr>
            <tr>
                <td class="label">Minutely earnings:</td>
                <td>$<input id="minute" placeholder="0.00"></td>
            </tr>
            <tr>
                <td class="label">Secondly earnings:</td>
                <td>$<input id="seconds" placeholder="0.00"></td>
            </tr>
            <tr>
                <td class="label">Time to $1:</td>
                <td><input id="ttd" placeholder="0.00">seconds</td>
            </tr>
            <tr>
                <td class="label">Time to $10:</td>
                <td><input id="ttt" placeholder="0.00">minutes</td>
            </tr>
            <tr>
                <td class="label">Time to $100:</td>
                <td><input id="tth" placeholder="0.00">hours</td>
            </tr>
        </tbody>
    </table>
    <script src="script.js"></script>

</body>

</html>
